name: L1 - Build TheGoodFramework (PR → release/0.0.0)

on:
  pull_request:
    branches:
      - release/0.0.0
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        default: 'release/0.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TheGoodFramework repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.inputs.branch || 'release/0.0.0' }}

      - name: Log in to GuildSwarm registry
        uses: docker/login-action@v2
        with:
          registry: omicsflowinternal.azurecr.io
          username: ${{ secrets.REG_USERNAME }}
          password: ${{ secrets.REG_PASSWORD }}

      - name: Run local_deploy.sh
        run: |
          cd TheGoodFramework
          chmod +x ./local_deploy.sh
          ./local_deploy.sh --no-cache --bgs
        env:
          IMAGE_REGISTRY: omicsflowinternal.azurecr.io
          OMICSFLOW_ENVIRONMENT: development
