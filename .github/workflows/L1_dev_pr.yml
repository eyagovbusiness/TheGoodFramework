name: L1.TheGoodFramework - Build (PR -> dev)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - dev

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (default: dev)'
        default: 'dev'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TheGoodFramework repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.inputs.branch || 'dev' }}

      - name: Log in to image registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REG_ADDRESS }}
          username: ${{ secrets.REG_USERNAME }}
          password: ${{ secrets.REG_PASSWORD }}

      - name: Run local_deploy.sh
        run: |
          chmod +x ./local_deploy.sh
          ./local_deploy.sh --no-cache --bgs
        env:
          IMAGE_REGISTRY: ${{ secrets.REG_ADDRESS }}
          OMICSFLOW_ENVIRONMENT: development
